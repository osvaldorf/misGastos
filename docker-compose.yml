services:

  postgres:
    image: postgres:16-alpine
    container_name: misgastos-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=misgastos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-misgastos}
      - POSTGRES_DB=misgastos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema_postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misgastos"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: misgastos-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./main.py:/app/main.py
      - ./fase1_patrimonio.py:/app/fase1_patrimonio.py
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: misgastos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
