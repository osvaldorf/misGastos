services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: misgastos-api
    restart: unless-stopped
    env_file: .env
    environment:
      - TNS_ADMIN=/app/wallet
    volumes:
      - ./wallet:/app/wallet:ro
      - ./main.py:/app/main.py
      - ./fase1_patrimonio.py:/app/fase1_patrimonio.py
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: misgastos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
